<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Laptop / Web Browser outline -->
  <rect x="2" y="3" width="15" height="11" rx="2" />
  <line x1="2" y1="10" x2="17" y2="10" stroke-width="1.5" />
  <!-- Mobile Phone overlapping frame -->
  <rect x="13" y="8" width="9" height="13" rx="2" fill="var(--vscode-sideBar-background, #252526)" stroke-width="2" />
  <!-- Dynamic Island punch hole inside phone -->
  <rect x="16.5" y="10.5" width="2" height="1" rx="0.5" fill="currentColor" stroke="none" />
  <!-- Browser tabs buttons -->
  <circle cx="5" cy="6.5" r="0.75" fill="currentColor" stroke="none" />
  <circle cx="8" cy="6.5" r="0.75" fill="currentColor" stroke="none" />
</svg>
